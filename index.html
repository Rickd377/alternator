<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Browser customization -->
  <meta name="theme-color" content="#18181B">
  <meta name="color-scheme" content="dark">

  <!-- import font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

  <!-- import fontawesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

  <link rel="icon" type="image/x-icon" href="./assets/favicon.ico" />
  <link rel="stylesheet" href="./styles/dist/main.css">

  <title>The Alternator</title>
</head>
<body>
  
  <div class="container">
    <div class="container-header">
      <nav class="nav-settings">
        <ul>
          <li>
            <i class="fa-solid fa-gear"></i>
          </li>
        </ul>
      </nav>
      <hr class="line">
      <nav class="nav-selections">
        <ul>
          <li class="active time">
            <i class="fa-solid fa-clock"></i>
            <span>time</span>
          </li>
          <li class="repetitions">
            <i class="fa-solid fa-arrow-rotate-left"></i>
            <span>Repetitions</span>
          </li>
        </ul>
      </nav>
      <hr class="line">
      <nav class="nav-options">
        <section class="time-options">
          <ul>
            <li class="active" data-seconds="5">
              <span>5</span>
            </li>
            <li data-seconds="10">
              <span>10</span>
            </li>
            <li data-seconds="15">
              <span>15</span>
            </li>
            <li data-seconds="30">
              <span>30</span>
            </li>
          </ul>
        </section>
        <section class="repetitions-options">
          <ul>
            <li class="active" data-reps="10">
              <span>10</span>
            </li>
            <li data-reps="25">
              <span>25</span>
            </li>
            <li data-reps="50">
              <span>50</span>
            </li>
            <li data-reps="100">
              <span>100</span>
            </li>
          </ul>
        </section>
      </nav>
    </div>
    <div class="output-display"></div>
  </div>

  <div class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">settings</h2>
        <i id="closeModal" class="fa-solid fa-xmark close-modal-icon"></i>
      </div>
      <div class="button-wrapper">
        <button id="closeModal" class="close-modal-btn">cancel</button>
        <button id="saveSettings" class="save-settings-btn">save</button>
      </div>
    </div>
  </div>
  
  <script src="./js/nav.js"></script>

    function windowSize() {
      if (window.innerWidth <= 768) {
        alert("This website is supposed to be used ");
      }
    }

    window.addEventListener("resize", windowSize);
    windowSize();
  </script> -->
</body>
</html>
