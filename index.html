<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Browser customization -->
  <meta name="theme-color" content="#1f1f1f">
  <meta name="color-scheme" content="dark">

  <!-- import font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

  <link rel="icon" type="image/x-icon" href="./assets/favicon.ico" />
  <link rel="stylesheet" href="./styles/dist/main.css">

  <!-- import phosphor icons -->
  <script src="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2"></script>

  <title>The Alternator</title>
</head>
<body>
  
  <div class="container">
    <div class="container-header">
      <nav class="nav-settings">
        <ul>
          <li>
            <i class="ph-fill ph-gear-six"></i>
          </li>
        </ul>
      </nav>
      <hr class="line">
      <nav class="nav-selections">
        <ul>
          <li class="active time">
            <i class="ph-fill ph-clock"></i>
            <span>time</span>
          </li>
          <li class="repetitions">
            <i class="ph-fill ph-arrow-clockwise"></i>
            <span>repetitions</span>
          </li>
        </ul>
      </nav>
      <hr class="line">
      <nav class="nav-options">
        <section class="time-options">
          <ul>
            <li class="active" data-seconds="5">
              <span>5</span>
            </li>
            <li data-seconds="10">
              <span>10</span>
            </li>
            <li data-seconds="15">
              <span>15</span>
            </li>
            <li data-seconds="30">
              <span>30</span>
            </li>
          </ul>
        </section>
        <section class="repetitions-options">
          <ul>
            <li class="active" data-reps="10">
              <span>10</span>
            </li>
            <li data-reps="25">
              <span>25</span>
            </li>
            <li data-reps="50">
              <span>50</span>
            </li>
            <li data-reps="100">
              <span>100</span>
            </li>
          </ul>
        </section>
      </nav>
    </div>
    <div class="label-wrapper">
      <label>output:</label>
      <label class="progress-label"></label>
    </div>
    <div class="output-display">
      <span class="output-placeholder"></span>
    </div>
    <canvas class="live-graph"></canvas>
  </div>

  <div class="modal" id="statsModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">profile stats</h2>
        <i id="closeStatsModal" class="ph-bold ph-x close-modal-icon"></i>
      </div>
      <div class="modal-body">
        <div>
          <span>current used keys:</span>
          <span class="keybinds-used"></span>
        </div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
      </div>
      <div class="modal-footer">
        <button id="closeStatsModal" class="close-modal-btn">cancel</button>
        <button id="saveStatsBtn" class="save-stats-btn">save</button>
      </div>
    </div>
  </div>

  <div class="modal finish-modal" id="finishModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">results</h2>
        <i id="closeFinishModal" class="ph-bold ph-x close-modal-icon"></i>
      </div>
      <div class="modal-body">
        <div>
          <span>keys pressed:</span>
          <span class="sesh-keys-pressed"></span>
        </div>
        <div>
          <span>speed:</span>
          <span class="sesh-speed"></span>
        </div>
        <div>
          <span>alt accuracy:</span>
          <span class="sesh-accuracy"></span>
        </div>
      </div>
      <div class="modal-footer">
        <button id="closeFinishModal" class="close-modal-btn">close</button>
        <button id="restartBtn" class="restart-btn">restart</button>
      </div>
    </div>
  </div>
  
  <script src="./js/main.js"></script>
</body>
</html>
